<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/css/estilo.css">
    <title>WellBets</title>
</head>
<body>
    <header>
        <p class="logo">WellBets 2026</p>
        <img src="./src/assets/logo_br.png" alt="Logo bandeira do Brasil">
    </header>
    

    <main id="Container">
        <div class="name">
            <h2>Próximas Partidas</h2>
        </div>
        <section class="cards">
            <div class="card">
                <img class="img" src="./src/assets/brasil.png" alt="bandeira brasil">
                <img class="img" src="./src/assets/haiti.png" alt="bandeira haiti">
                <article class="card-content">
                    <h2>Brasil VS Haiti</h2>
                    <h3>19/06 - 21h30</h3>
                    <div class="input">
                        <input class="button" type="number" min="0" max="10" placeholder="Brasil" id="time1">
                        <input class="button" type="number" min="0" max="10" placeholder="Haiti" id="time2">

                    </div>
                    <button onclick="salvarPalpite('Brasil vs Haiti',1)" class="button2">Lançar palpite</button>


                </article>

            </div>

            <div class="card">
                <img class="img" src="./src/assets/holanda.png" alt="bandeira holanda">
                <img class="img" src="./src/assets/japao.png" alt="bandeira japão">
                <article class="card-content">
                    <h2>Holanda VS Japão</h2>
                    <h3>15/06 - 16h00</h3>
                    <div class="input">
                        <input class="button" type="number" min="0" max="10" placeholder="Holanda" id="time1">
                        <input class="button" type="number" min="0" max="10" placeholder="Japão" id="time2">
                    </div>
                    <button onclick="salvarPalpite('Holanda vs Japão',2)" class="button2">Lançar palpite</button>

                </article>

            </div>

        </section>

        <div class="name">
            <h2>Histórico de Palpites</h2>
        </div>

    </main>
    <footer>
        <p>&copy; 2026-Bolão</p>
    </footer>
    <!-- JS EXTERNO -->
    <script src="./src/js/script.js"></script>
</body>

</html>
